  <text x="48" y="72" fill="#22D3EE" font-family="Segoe UI, Arial, sans-serif" font-size="35" font-weight="850">Κατέβασε την εφαρμογή Scanner</text>
  <text x="48" y="124" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="650">Η σάρωση QR γίνεται από native Android εφαρμογή, όχι από browser.</text>
