services:
  school-inventory-manager:
    build: .
    container_name: school-inventory-manager
    restart: unless-stopped
    ports:
      - "5148:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Data Source=/app/App_Data/school_inventory.db"
    volumes:
      - school_inventory_app_data:/app/App_Data

volumes:
  school_inventory_app_data:
