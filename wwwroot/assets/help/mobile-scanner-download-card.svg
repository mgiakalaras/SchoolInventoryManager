  <text x="248" y="236" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Η εφαρμογή συνδέεται με τον server του σχολείου και αποθηκεύει τις σαρώσεις στον φάκελο απογραφής.</text>
